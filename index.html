<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RBXAI — Roblox Script Engine | By.DevFahmi</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#06080f;--bg2:#0a0d17;--bg3:#0f1221;--bg4:#141829;
  --border:#1c2035;--border2:#252a3d;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#4a5568;
  --accent:#6366f1;--accent2:#8b5cf6;--accent3:#06b6d4;
  --red:#f43f5e;--green:#10b981;--yellow:#f59e0b;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;overflow:hidden;
  background-image:radial-gradient(ellipse at 15% 20%,rgba(99,102,241,.06) 0%,transparent 55%),
                   radial-gradient(ellipse at 85% 80%,rgba(139,92,246,.04) 0%,transparent 55%);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* ── LOADING SPLASH ── */
#splash{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.splash-logo{width:60px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#fff;font-family:'JetBrains Mono',monospace;box-shadow:0 0 40px rgba(99,102,241,.4);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(99,102,241,.3);}50%{box-shadow:0 0 50px rgba(99,102,241,.6);}}
.splash-title{font-size:22px;font-weight:700;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.splash-sub{font-size:12px;color:var(--text3);letter-spacing:.5px;}
.splash-bar{width:160px;height:3px;background:var(--border2);border-radius:2px;overflow:hidden;margin-top:4px;}
.splash-prog{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;animation:prog 1.2s ease forwards;}
@keyframes prog{from{width:0%;}to{width:100%;}}

/* ── TOAST ── */
#toast{position:fixed;top:62px;right:14px;z-index:600;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.ti{background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:8px 14px;font-size:11.5px;color:var(--text);display:flex;align-items:center;gap:7px;animation:tin .22s ease;box-shadow:0 8px 24px rgba(0,0,0,.4);max-width:260px;}
.ti.ok{border-color:rgba(16,185,129,.3);}
.ti.err{border-color:rgba(244,63,94,.3);}
@keyframes tin{from{opacity:0;transform:translateX(14px);}to{opacity:1;transform:translateX(0);}}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;}

/* ── HEADER ── */
header{background:rgba(6,8,15,.94);border-bottom:1px solid var(--border);padding:0 14px;height:52px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px);position:relative;z-index:50;flex-shrink:0;gap:8px;}
.hlogo{display:flex;align-items:center;gap:8px;}
.hicon{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#fff;font-family:'JetBrains Mono',monospace;flex-shrink:0;box-shadow:0 0 14px rgba(99,102,241,.3);}
.hname{font-weight:700;font-size:14px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hsub{font-size:8.5px;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;margin-top:-3px;}
.htabs{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px;flex-shrink:0;}
.htab{padding:4px 11px;border-radius:5px;border:none;cursor:pointer;font-size:11.5px;font-weight:500;transition:all .18s;font-family:'Inter',sans-serif;color:var(--text3);background:transparent;white-space:nowrap;}
.htab.on{background:var(--bg4);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3);}
.hright{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.ctag{font-size:9.5px;font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--accent);border:1px solid rgba(99,102,241,.22);padding:2px 8px;border-radius:20px;background:rgba(99,102,241,.07);white-space:nowrap;}
.odot{width:6px;height:6px;background:var(--green);border-radius:50%;box-shadow:0 0 5px var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.5;}}
.hbtn{background:none;border:none;color:var(--text3);cursor:pointer;padding:5px 6px;border-radius:6px;font-size:14px;transition:all .15s;}
.hbtn:hover{background:var(--bg3);color:var(--text);}

/* ── BODY ── */
.abody{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
aside{width:0;min-width:0;overflow:hidden;background:var(--bg2);border-right:1px solid var(--border);transition:width .22s,min-width .22s;display:flex;flex-direction:column;flex-shrink:0;}
aside.open{width:218px;min-width:218px;}
.ai-inner{width:218px;display:flex;flex-direction:column;height:100%;overflow:hidden;}
.ai-sec{padding:12px 10px 8px;border-bottom:1px solid var(--border);}
.ai-lbl{font-size:9.5px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:8px;}
.ai-scroll{padding:10px;flex:1;overflow-y:auto;}
.ai-foot{padding:9px 10px;border-top:1px solid var(--border);}
.hi{padding:7px 9px;border-radius:7px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;transition:all .12s;position:relative;}
.hi:hover{background:var(--bg3);border-color:var(--border);}
.hi-title{font-size:11px;color:var(--text2);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hi-meta{font-size:9px;color:var(--text3);margin-top:2px;}
.hi-del{position:absolute;right:5px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;opacity:0;transition:opacity .12s;padding:2px 4px;}
.hi:hover .hi-del{opacity:1;}
.qbtn{width:100%;text-align:left;padding:6px 9px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text3);font-size:11px;cursor:pointer;margin-bottom:3px;transition:all .12s;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px;}
.qbtn:hover{background:var(--bg3);border-color:var(--border2);color:var(--text);}
.qdot{width:5px;height:5px;background:var(--accent);border-radius:50%;flex-shrink:0;}
.clr-btn{width:100%;padding:6px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text3);font-size:10.5px;cursor:pointer;transition:all .12s;font-family:'Inter',sans-serif;}
.clr-btn:hover{border-color:rgba(244,63,94,.3);color:var(--red);}

/* ── MAIN ── */
main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* ── CHAT ── */
#chat-view{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:12px;}
.msg{display:flex;gap:8px;animation:min .2s ease;}
.msg.user{flex-direction:row-reverse;}
@keyframes min{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.av{width:28px;height:28px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.av.ai{background:linear-gradient(135deg,var(--accent),var(--accent2));}
.av.user{background:linear-gradient(135deg,#0ea5e9,#1d4ed8);}
.bwrap{max-width:84%;display:flex;flex-direction:column;gap:3px;}
.msg.user .bwrap{align-items:flex-end;}
.bub{border-radius:13px;padding:10px 14px;font-size:13.5px;line-height:1.75;position:relative;}
.bub.ai{background:var(--bg3);border:1px solid var(--border);}
.bub.user{background:linear-gradient(135deg,#1a3560,#172b4a);border:1px solid rgba(14,165,233,.18);}
.macts{display:flex;gap:3px;opacity:0;transition:opacity .12s;}
.bwrap:hover .macts{opacity:1;}
.ma{background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text3);font-size:10px;padding:2px 7px;cursor:pointer;transition:all .12s;font-family:'Inter',sans-serif;}
.ma:hover{border-color:var(--border2);color:var(--text);}
.ma.del:hover{border-color:rgba(244,63,94,.3);color:var(--red);}
.edit-ta{width:100%;background:var(--bg2);border:1px solid var(--accent);border-radius:9px;padding:9px 11px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;resize:none;outline:none;line-height:1.6;}
.edit-row{display:flex;gap:5px;margin-top:5px;}
.esave{background:var(--accent);border:none;border-radius:7px;color:#fff;padding:4px 12px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.ecancel{background:transparent;border:1px solid var(--border2);border-radius:7px;color:var(--text3);padding:4px 10px;font-size:11.5px;cursor:pointer;font-family:'Inter',sans-serif;}

/* ── CODE BLOCK ── */
.cb{border-radius:11px;overflow:hidden;border:1px solid var(--border2);margin:8px 0 4px;}
.cbh{background:#080a14;padding:6px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.cblang{color:#f43f5e;font-size:10px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;font-weight:600;}
.cbacts{display:flex;gap:4px;}
.cbbtn{background:rgba(255,255,255,.04);border:1px solid var(--border2);color:var(--text3);padding:2px 8px;border-radius:4px;cursor:pointer;font-size:10px;font-family:'JetBrains Mono',monospace;transition:all .15s;}
.cbbtn:hover{background:rgba(255,255,255,.09);color:var(--text);}
.cbbtn.ok{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.35);color:var(--green);}
.cbb{background:#050710;overflow-x:auto;padding:12px 0;}
.cbt{border-spacing:0;width:100%;}
.cln{padding:0 12px 0 10px;color:var(--border2);font-size:11px;font-family:'JetBrains Mono',monospace;user-select:none;text-align:right;min-width:36px;line-height:1.6;vertical-align:top;}
.clc{padding:0 14px 0 0;font-size:12px;font-family:'JetBrains Mono',monospace;white-space:pre;line-height:1.6;color:#abb2bf;}
.oe-btn{font-size:10px;background:transparent;border:1px solid var(--border);color:var(--text3);padding:2px 9px;border-radius:5px;cursor:pointer;margin-bottom:5px;transition:all .13s;font-family:'Inter',sans-serif;}
.oe-btn:hover{border-color:rgba(99,102,241,.4);color:var(--accent);}

/* ── TYPING ── */
.typing-bub{display:flex;gap:5px;align-items:center;padding:11px 14px;}
.td{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:tdp 1.1s infinite;}
.ttext{font-size:11px;color:var(--text3);margin-left:4px;}
@keyframes tdp{0%,100%{opacity:.25;transform:scale(.75);}50%{opacity:1;transform:scale(1.1);}}

/* ── ERROR BAR ── */
.ebar{display:flex;align-items:center;gap:8px;background:rgba(244,63,94,.07);border:1px solid rgba(244,63,94,.22);border-radius:9px;padding:9px 12px;font-size:12.5px;color:#fda4af;flex-wrap:wrap;gap:8px;}
.rbtn{background:rgba(244,63,94,.12);border:1px solid rgba(244,63,94,.28);color:#fda4af;padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;font-family:'Inter',sans-serif;white-space:nowrap;}
.rbtn:hover{background:rgba(244,63,94,.22);}

/* ── INPUT BAR ── */
.ibar{padding:10px 14px 12px;border-top:1px solid var(--border);background:rgba(6,8,15,.88);backdrop-filter:blur(20px);flex-shrink:0;}
.ibar-in{display:flex;gap:8px;align-items:flex-end;background:var(--bg3);border:1px solid var(--border2);border-radius:13px;padding:9px 10px;transition:border-color .2s;}
.ibar-in:focus-within{border-color:rgba(99,102,241,.4);}
#chat-input{flex:1;background:transparent;color:var(--text);border:none;padding:0;font-size:13.5px;font-family:'Inter',sans-serif;resize:none;line-height:1.6;outline:none;max-height:130px;min-height:22px;}
#chat-input::placeholder{color:var(--text3);}
.sbtn{width:34px;height:34px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;font-weight:700;}
.sbtn:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed;}
.sbtn:hover:not(:disabled){opacity:.85;transform:scale(1.04);}
.ifoot{display:flex;justify-content:space-between;align-items:center;margin-top:7px;padding:0 2px;}
.ihint{font-size:10px;color:var(--text3);}
.icredit{display:flex;align-items:center;gap:5px;}
.cline{height:1px;width:34px;}
.cline.l{background:linear-gradient(90deg,transparent,var(--border2));}
.cline.r{background:linear-gradient(90deg,var(--border2),transparent);}
.ctext{font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:600;background:linear-gradient(90deg,var(--accent2),var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* ── EDITOR ── */
#editor-view{flex:1;overflow-y:auto;padding:14px;display:none;flex-direction:column;gap:12px;}
.eg{display:grid;grid-template-columns:1fr 1fr;gap:14px;min-height:0;}
.epan{display:flex;flex-direction:column;gap:8px;}
.plbl{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;font-weight:600;}
#editor-ta{flex:1;width:100%;background:#050710;color:#abb2bf;border:1px solid var(--border);border-radius:11px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;tab-size:2;resize:none;outline:none;transition:border-color .18s;min-height:300px;}
#editor-ta:focus{border-color:rgba(99,102,241,.35);}
.abtns{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.abtn{padding:8px;border-radius:8px;cursor:pointer;font-size:11.5px;font-weight:600;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:5px;font-family:'Inter',sans-serif;border:1px solid;}
.abtn:disabled{opacity:.35;cursor:not-allowed;}
.abtn:hover:not(:disabled){transform:translateY(-1px);opacity:.82;}
.stcbtn{width:100%;padding:7px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:11.5px;font-weight:500;transition:all .15s;font-family:'Inter',sans-serif;}
.stcbtn:hover{border-color:rgba(99,102,241,.35);color:var(--accent);}
.rpan{display:flex;flex-direction:column;min-height:0;}
.rlbl{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;font-weight:600;margin-bottom:8px;}
.rbox{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:14px;overflow-y:auto;min-height:300px;}
.remp{display:flex;flex-direction:column;align-items:center;justify-content:center;height:240px;color:var(--text3);gap:7px;}
.mpill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;margin-bottom:10px;font-size:10.5px;font-weight:600;border:1px solid;}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── MARKDOWN ── */
.mh2{font-size:14.5px;font-weight:700;color:#93c5fd;margin:11px 0 4px;}
.mh3{font-size:12.5px;font-weight:600;color:var(--green);margin:7px 0 3px;}
.mhr{border:none;border-top:1px solid var(--border);margin:10px 0;}
.mbq{border-left:3px solid var(--accent);padding-left:11px;color:var(--text2);font-style:italic;margin:5px 0;}
.mli{display:flex;gap:7px;margin:2px 0;}
.mbul{color:var(--accent);font-size:11px;margin-top:3px;}
.mnu{display:flex;gap:7px;margin:2px 0;}
.mnk{color:var(--yellow);min-width:17px;font-size:11px;}
.mic{background:rgba(99,102,241,.13);color:#a5b4fc;padding:1px 5px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;}
.mst{color:var(--yellow);font-weight:600;}
.mem{color:var(--green);}

/* ── RESPONSIVE ── */
@media(max-width:660px){
  .eg{grid-template-columns:1fr;}
  .ctag,.hsub{display:none;}
  aside.open{position:absolute;z-index:40;height:calc(100vh - 52px);width:218px;min-width:218px;}
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">R</div>
  <div class="splash-title">RBXAI</div>
  <div class="splash-sub">Roblox Script Engine — By.DevFahmi</div>
  <div class="splash-bar"><div class="splash-prog"></div></div>
</div>

<div id="toast"></div>

<!-- APP -->
<div id="app">
  <!-- HEADER -->
  <header>
    <div class="hlogo">
      <button class="hbtn" onclick="toggleSb()">☰</button>
      <div class="hicon">R</div>
      <div>
        <div class="hname">RBXAI</div>
        <div class="hsub">Roblox Script Engine</div>
      </div>
    </div>

    <div class="htabs">
      <button class="htab on" id="tc" onclick="setTab('chat')">💬 Chat</button>
      <button class="htab" id="te" onclick="setTab('editor')">⚡ Analyzer</button>
    </div>

    <div class="hright">
      <span class="ctag">By.DevFahmi</span>
      <div style="display:flex;align-items:center;gap:4px;"><div class="odot"></div><span style="font-size:10px;color:var(--text3);">Online</span></div>
      <button class="hbtn" title="Chat Baru" onclick="newChat()">✏️</button>
    </div>
  </header>

  <!-- BODY -->
  <div class="abody">
    <!-- SIDEBAR -->
    <aside id="sb">
      <div class="ai-inner">
        <div class="ai-sec">
          <div class="ai-lbl">Riwayat Script</div>
          <div id="hl" style="overflow-y:auto;max-height:38vh;">
            <div id="he" style="font-size:11px;color:var(--text3);text-align:center;padding:14px 0;">Belum ada riwayat</div>
          </div>
        </div>
        <div class="ai-scroll">
          <div class="ai-lbl">Quick Scripts</div>
          <div id="ql"></div>
        </div>
        <div class="ai-foot">
          <button class="clr-btn" onclick="clearHist()">🗑 Hapus Semua Riwayat</button>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main>
      <!-- CHAT VIEW -->
      <div id="chat-view"></div>

      <!-- EDITOR VIEW -->
      <div id="editor-view">
        <div class="eg">
          <div class="epan">
            <div class="plbl">📝 Script Editor</div>
            <textarea id="editor-ta" spellcheck="false">-- Paste script Anda di sini untuk dianalisis

local Players = game:GetService("Players")

Players.PlayerAdded:Connect(function(player)
    print(player.Name .. " joined!")
end)</textarea>
            <div class="abtns">
              <button class="abtn" id="ab-debug"    onclick="doAnalyze('debug')"    style="border-color:rgba(244,63,94,.3);background:rgba(244,63,94,.07);color:#f43f5e;">🔍 Debug</button>
              <button class="abtn" id="ab-optimize" onclick="doAnalyze('optimize')" style="border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.07);color:#f59e0b;">⚡ Optimize</button>
              <button class="abtn" id="ab-validate" onclick="doAnalyze('validate')" style="border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.07);color:#10b981;">✅ Validate</button>
              <button class="abtn" id="ab-explain"  onclick="doAnalyze('explain')"  style="border-color:rgba(6,182,212,.3);background:rgba(6,182,212,.07);color:#06b6d4;">📖 Explain</button>
            </div>
            <button class="stcbtn" onclick="editorToChat()">💬 Kirim ke Chat AI</button>
          </div>
          <div class="rpan">
            <div class="rlbl" id="rlbl">📊 Hasil Analisis</div>
            <div class="rbox" id="rbox">
              <div class="remp">
                <div style="font-size:38px;">🤖</div>
                <div style="font-size:12.5px;">Pilih tindakan analisis di sebelah kiri</div>
                <div style="font-size:10.5px;color:var(--border2);margin-top:2px;">Debug • Optimize • Validate • Explain</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- INPUT BAR -->
      <div class="ibar" id="ibar">
        <div class="ibar-in">
          <textarea id="chat-input" rows="1" placeholder="Deskripsikan script yang ingin dibuat... atau paste kode untuk di-debug"></textarea>
          <button class="sbtn" id="sbtn" onclick="sendMsg()">↑</button>

function hl(code){
  let r=code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const kw=['local','function','end','if','then','else','elseif','for','do','while','repeat','until','return','break','not','and','or','in','nil','true','false','self','continue'];
  const rg=['game','workspace','script','Instance','Vector3','CFrame','Color3','BrickColor','Enum','UDim','UDim2','TweenInfo','Ray','RaycastParams','table','string','math','os','coroutine','task','Random'];
  const bi=['print','warn','error','pcall','xpcall','ipairs','pairs','next','select','type','tostring','tonumber','rawget','rawset','require','assert','setmetatable','getmetatable','wait','spawn','delay','unpack'];
  r=r.replace(/"([^"\\]|\\.)*"|'([^'\\]|\\.)*'|\[\[[\s\S]*?\]\]/g,m=>`<span style="color:#6ee7b7">${m}</span>`);
  r=r.replace(/(--[^\n]*)/g,m=>`<span style="color:#475569;font-style:italic">${m}</span>`);
  r=r.replace(/\b(\d+\.?\d*)\b/g,m=>`<span style="color:#fbbf24">${m}</span>`);
  kw.forEach(k=>{r=r.replace(new RegExp(`\\b(${k})\\b`,'g'),`<span style="color:#a78bfa">$1</span>`);});
  rg.forEach(k=>{r=r.replace(new RegExp(`\\b(${k})\\b`,'g'),`<span style="color:#fcd34d">$1</span>`);});
  bi.forEach(k=>{r=r.replace(new RegExp(`\\b(${k})\\b`,'g'),`<span style="color:#67e8f9">$1</span>`);});
  r=r.replace(/\b([a-zA-Z_][a-zA-Z0-9_]*)\s*(?=\()/g,`<span style="color:#93c5fd">$1</span>`);
  return r;
}

function parse(text){
  const parts=[];const re=/```(\w*)\n?([\s\S]*?)```/g;let last=0,m;
  while((m=re.exec(text))!==null){
    if(m.index>last)parts.push({t:'txt',c:text.slice(last,m.index)});
    parts.push({t:'code',lang:m[1]||'lua',c:m[2].trim()});
    last=m.index+m[0].length;
  }
  if(last<text.length)parts.push({t:'txt',c:text.slice(last)});
  return parts.map(p=>p.t==='code'?mkCode(p.c,p.lang):mdR(p.c)).join('');
}
function mdR(text){
  return text.split('\n').map(ln=>{
    if(/^## /.test(ln))return`<div class="mh2">${inl(ln.slice(3))}</div>`;
    if(/^### /.test(ln))return`<div class="mh3">${inl(ln.slice(4))}</div>`;
    if(/^---/.test(ln))return`<hr class="mhr"/>`;
    if(/^> /.test(ln))return`<div class="mbq">${inl(ln.slice(2))}</div>`;
    if(/^- /.test(ln))return`<div class="mli"><span class="mbul">▸</span><span>${inl(ln.slice(2))}</span></div>`;
    const nm=ln.match(/^(\d+)\. (.*)/);
    if(nm)return`<div class="mnu"><span class="mnk">${nm[1]}.</span><span>${inl(nm[2])}</span></div>`;
    if(!ln.trim())return`<div style="height:4px"></div>`;
    return`<div>${inl(ln)}</div>`;
  }).join('');
}
function inl(t){
  t=t.replace(/\*\*(.+?)\*\*/g,'<span class="mst">$1</span>');
  t=t.replace(/\*(.+?)\*/g,'<span class="mem">$1</span>');
  t=t.replace(/`(.+?)`/g,'<code class="mic">$1</code>');
  return t;
}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  }catch(e){
    rl.textContent='📊 Hasil Analisis';
    rb.innerHTML=`<div class="ebar">❌ ${fmtErr(e)}<button class="rbtn" onclick="doAnalyze('${mode}')">↺ Retry</button></div>`;
  }
  analyzing=false;setABtns(false);
}
function setABtns(d){['debug','optimize','validate','explain'].forEach(m=>{document.getElementById('ab-'+m).disabled=d;});}
function editorToChat(){
  const c=document.getElementById('editor-ta').value.trim();
  if(!c){toast('Editor kosong','err');return;}
  const ta=document.getElementById('chat-input');
  ta.value='Analisis script ini:\n```lua\n'+c+'\n```';
  ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,130)+'px';
  setTab('chat');ta.focus();
}

/* ══════════════════════════════════════
   API — calls /api/chat (Vercel proxy)
══════════════════════════════════════ */
async function callAPI(messages){
  const res=await fetch(API_ENDPOINT,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:MODEL,
      max_tokens:4096,
      system:SYS,
      messages:messages.slice(-24)
    })
  });
  if(!res.ok){
    let msg='Server error '+res.status;
    try{const j=await res.json();msg=j.error?.message||msg;}catch(e){}
    throw new Error(msg);
  }
  const d=await res.json();
  if(d.error)throw new Error(d.error.message);
  return d.content?.[0]?.text||'Tidak ada respons.';
}
